<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Year Proximity Comparer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input[type="text"], select {
      width: calc(100% - 24px);
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Year Proximity Comparer</h2>
    <label for="base-year">Base Year:</label>
    <input type="text" id="base-year" placeholder="Enter base year">

    <label for="range-select">Select range to compare:</label>
    <select id="range-select">
      <option value="1,2">Subtract 1, Add 2</option>
      <option value="2,3">Subtract 2, Add 3</option>
      <option value="18,19">Subtract 18, Add 19 (for inputting years that are 158 years before the initial year in mind)</option>
      <option value="18,22">Subtract 18, Add 22 (for inputting years that are 158 years before the initial year in mind)</option>
      <option value="18,23">Subtract 18, Add 23 (for inputting years that are 158 years before the initial year in mind)</option>
      <option value="18,25">Subtract 18, Add 25 (for inputting years that are 158 years before the initial year in mind)</option>
      <option value="20,21">Subtract 20, Add 21 (for inputting years that are 154 years before the initial year in mind)</option>
      <option value="21,21">Subtract 21, Add 21</option>
      <option value="22,22">Subtract 22, Add 22 (for inputting years that are 158 years before the initial year in mind)</option>
      <option value="35,42">Subtract 35, Add 42 (for inputting years that are 218 years before the initial year in mind)</option>
      <option value="39,41">Subtract 39, Add 41</option>
      <option value="55,60">Subtract 55, Add 60 (for inputting years that are 78 or 79 years before the initial year in mind)</option>
      <option value="55,64">Subtract 55, Add 64 (for inputting years that are 218 years before the initial year in mind)</option>
      <option value="57,58">Subtract 57, Add 58 (for inputting years that are 76, 176, or 316 years before the initial year in mind)</option>
      <option value="58,60">Subtract 58, Add 60 (for inputting years that are 218 years before the initial year in mind)</option>
      <option value="58,64">Subtract 58, Add 64 (for inputting years that are 218 years before the initial year in mind)</option>
      <option value="60,60">Subtract 60, Add 60 (for inputting years that are 158, 196, or 218 years before the initial year in mind)</option>
      <option value="75,78">Subtract 75, Add 78 (for inputting years that are 158 years before the initial year in mind)</option>
      <option value="76,78">Subtract 76, Add 78 (for inputting years that are 158 years before the initial year in mind)</option>
      <option value="76,80">Subtract 76, Add 80</option>
      <option value="76,82">Subtract 76, Add 82</option>
      <option value="77,77">Subtract 77, Add 77 (for inputting years that are 156 years before the initial year in mind)</option>
      <option value="77,78">Subtract 77, Add 78 (for inputting years that are 156 years before the initial year in mind)</option>
      <option value="77,82">Subtract 77, Add 82 (for inputting years that are 256 years before the initial year in mind)</option>
      <option value="78,78">Subtract 78, Add 78 (for inputting years that are 156 years before the initial year in mind)</option>
      <option value="80,80">Subtract 80, Add 80 (for inputting years that are 256 years before the initial year in mind)</option>
      <option value="97,97">Subtract 97, Add 97 (for inputting years that are 176 years before the initial year in mind)</option>
      <option value="100,102">Subtract 100, Add 102 (for inputting years that are 156 years before the initial year in mind)</option>
      <option value="117,117">Subtract 117, Add 117 (for inputting years that are 156 or 256 years before the initial year in mind)</option>
    </select>

    <div class="result" id="result"></div>
  </div>

  <script>
    function compareYears() {
      var baseYear = parseFloat(document.getElementById('base-year').value);
      var rangeValue = document.getElementById('range-select').value;
      var [sub, add] = rangeValue.split(',').map(Number);

      if (isNaN(baseYear)) {
        document.getElementById('result').innerText = "Please enter a valid base year.";
        return;
      }

      var year1 = baseYear - sub;
      var year2 = baseYear + add;

      var diff1 = Math.abs(baseYear - year1);
      var diff2 = Math.abs(baseYear - year2);

      var resultText = "";

      if (diff1 < diff2) {
        resultText = baseYear + " is closer to " + year1 + " than to " + year2;
      } else if (diff2 < diff1) {
        resultText = baseYear + " is closer to " + year2 + " than to " + year1;
      } else {
        resultText = baseYear + " is equidistant to " + year1 + " and " + year2;
      }

      document.getElementById('result').innerText = resultText;
    }

    document.getElementById('base-year').addEventListener('input', compareYears);
    document.getElementById('range-select').addEventListener('change', compareYears);
  </script>
</body>
</html>
